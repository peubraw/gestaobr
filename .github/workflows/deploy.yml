name: Build and Deploy GestãoBR

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ghcr.io/peubraw/gestaobr-frontend
  BACKEND_IMAGE: ghcr.io/peubraw/gestaobr-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest
          build-args: |
            NEXT_PUBLIC_API_URL=/gestaobr/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/peubraw/gestaobr-backend:latest
            docker pull ghcr.io/peubraw/gestaobr-frontend:latest
            docker stop gestaobr-backend gestaobr-frontend 2>/dev/null || true
            docker rm gestaobr-backend gestaobr-frontend 2>/dev/null || true
            docker network create gestaobr-net 2>/dev/null || true
            docker run -d \
              --name gestaobr-backend \
              --network gestaobr-net \
              --restart unless-stopped \
              -p 8003:8000 \
              ghcr.io/peubraw/gestaobr-backend:latest
            docker run -d \
              --name gestaobr-frontend \
              --network gestaobr-net \
              --restart unless-stopped \
              -p 3005:3000 \
              -e BACKEND_URL=http://gestaobr-backend:8000 \
              -e NEXT_PUBLIC_API_URL=/gestaobr/api \
              ghcr.io/peubraw/gestaobr-frontend:latest
            docker image prune -f
